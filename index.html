<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>✨ AI 목소리 축하카드 ✨</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fdfbfb; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #333; text-align: center; }
        .card-box { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        textarea { width: 100%; height: 120px; padding: 15px; font-size: 16px; border-radius: 10px; border: 2px solid #ddd; outline: none; resize: none; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; background-color: #6c5ce7; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #5b4bc4; transform: translateY(-2px); }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        #loading { display: none; text-align: center; color: #d32f2f; font-weight: bold; margin-top: 15px; }
        #audioPlayer { width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h1>🎙️ AI 목소리 축하카드 🎙️</h1>

    <div class="card-box">
        <textarea id="messageInput" placeholder="여기에 읽어줄 메시지를 적어주십쇼! (예: 형님, 생일 축하드립니다!)"></textarea>
        <button id="generateBtn">🚀 AI 목소리 생성하기</button>
        
        <div id="loading">⏳ 대기 중...</div>
        
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const audioPlayer = document.getElementById('audioPlayer');

        generateBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (!text) return alert("메시지를 먼저 적어주십쇼!");

            audioPlayer.style.display = 'none';
            loading.style.display = 'block';
            loading.innerText = "🚀 AI가 대본을 녹음하는 중입니다...";
            generateBtn.disabled = true;

            try {
                // 1. 서버에 대본 주문 넣기 (방금 만든 voice.mjs 호출)
                const startResponse = await fetch('/api/voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                let prediction = await startResponse.json();

                if (!startResponse.ok || prediction.error) {
                    let errorMsg = prediction.detail ? JSON.stringify(prediction.detail) : (prediction.error || "알 수 없는 에러");
                    throw new Error("주문 거절됨: " + errorMsg);
                }

                // 2. 3초마다 녹음 다 됐는지 확인 (형님이 마스터하신 그 폴링 로직!)
                while (prediction.status !== "succeeded" && prediction.status !== "failed") {
                    await new Promise(r => setTimeout(r, 3000)); 
                    
                    loading.innerText = `⏳ 녹음 진행 중... (상태: ${prediction.status})`;
                    
                    const pollResponse = await fetch('/api/voice', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ predictionId: prediction.id }) 
                    });
                    
                    prediction = await pollResponse.json();

                    if (!pollResponse.ok) {
                        let errorMsg = prediction.detail ? JSON.stringify(prediction.detail) : (prediction.error || "알 수 없는 에러");
                        throw new Error("확인 중 오류: " + errorMsg);
                    }
                }

                // 3. 녹음 완료 시 플레이어에 띄우기
                if (prediction.status === "succeeded") {
                    audioPlayer.src = prediction.output; // 결과물(오디오 파일 URL)을 플레이어에 넣기
                    audioPlayer.style.display = 'block';
                } else {
                    throw new Error("녹음을 망쳤습니다. 상태: " + prediction.status);
                }

            } catch (error) {
                alert("통신 실패!\n원인: " + error.message);
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
