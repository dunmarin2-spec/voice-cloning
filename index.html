<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 마법 AI 성우실 - 밈(Meme) 제조기 ✨</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --main-color: #e84118; --bg-color: #ffffff; } 
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 30px; color: #2f3640; }
        h1 { font-size: 2.5rem; font-weight: 800; color: #2f3640; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        h1 span { color: var(--main-color); }
        p.subtitle { color: #7f8fa6; margin-top: 0; margin-bottom: 40px; font-weight: 500; }

        .app-container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 25px; }

        .section-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); border: 1px solid #f5f6fa; transition: 0.3s; }
        .section-card:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,0,0,0.1); }
        .section-title { font-size: 1.15rem; font-weight: 800; color: #353b48; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        textarea { width: 100%; height: 120px; padding: 18px; font-size: 17px; border-radius: 12px; border: 2px solid #dcdde1; outline: none; resize: none; box-sizing: border-box; transition: 0.2s; background: #fdfdfd; font-family: inherit; }
        textarea:focus { border-color: var(--main-color); background: white; box-shadow: 0 0 12px rgba(232, 65, 24, 0.15); }

        .voice-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .voice-option { display: none; } 
        .voice-label { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; background: #fcfcfc; border: 2px solid #dcdde1; border-radius: 14px; cursor: pointer; transition: 0.2s; text-align: center; gap: 6px; }
        .voice-label .icon { font-size: 2.2rem; }
        .voice-label .name { font-weight: 800; color: #2f3640; font-size: 0.95rem; word-break: keep-all; line-height: 1.2; }
        .voice-label .desc { font-size: 0.75rem; color: #7f8fa6; font-weight: 600; }
        
        .voice-option:checked + .voice-label { border-color: var(--main-color); background: #fff0ed; color: var(--main-color); transform: scale(1.02); }
        .voice-option:checked + .voice-label .name, .voice-option:checked + .voice-label .desc { color: var(--main-color); }

        button { width: 100%; background-color: var(--main-color); color: white; border: none; padding: 20px; font-size: 19px; font-weight: 800; border-radius: 14px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 20px rgba(232, 65, 24, 0.3); }
        button:hover { background-color: #c23616; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232, 65, 24, 0.4); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; transform: none; }

        #status-area { display: none; text-align: center; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); border: 2px dashed #dcdde1; }
        #loading-txt { font-weight: 800; font-size: 1.2rem; color: #e84118; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #audioPlayer { width: 100%; margin-top: 20px; display: none; border-radius: 30px; }
    </style>
</head>
<body>

    <h1>🎙️ AI <span>밈(Meme)</span> 제조기</h1>
    <p class="subtitle">유튜브 떡상 보장! 킹받는 컨셉으로 메시지를 쏴보십쇼!</p>

    <div class="app-container">
        <div class="section-card">
            <div class="section-title">✍️ 킹받는 대본 작성</div>
            <textarea id="messageInput" placeholder="읽어줄 메시지를 적어주십쇼! (예: 00번 훈련병! 생일 축하한다!)">00번 훈련병! 오늘 생일이라고 들었다! 엎드려 뻗쳐!</textarea>
        </div>

        <div class="section-card">
            <div class="section-title">👩‍🎤 타겟 컨셉 선택</div>
            <div class="voice-selector">
                
                <input type="radio" name="voiceSelect" id="voice1" class="voice-option" value="https://huggingface.co/datasets/Narsil/asr_dummy/resolve/main/1.flac" checked>
                <label for="voice1" class="voice-label">
                    <div class="icon">📺</div><div class="name">KBS 뉴스</div><div class="desc">단호한 앵커</div>
                </label>
                
                <input type="radio" name="voiceSelect" id="voice2" class="voice-option" value="https://huggingface.co/datasets/Xenova/transformers.js-docs/resolve/main/jfk.wav">
                <label for="voice2" class="voice-label">
                    <div class="icon">🏢</div><div class="name">대기업 회장</div><div class="desc">근엄한 호통</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice3" class="voice-option" value="https://huggingface.co/datasets/distil-whisper/librispeech_long/resolve/main/sample_01.wav">
                <label for="voice3" class="voice-label">
                    <div class="icon">📻</div><div class="name">새벽 2시 DJ</div><div class="desc">버터 바른 톤</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice4" class="voice-option" value="https://huggingface.co/datasets/Xenova/transformers.js-docs/resolve/main/voice.wav">
                <label for="voice4" class="voice-label">
                    <div class="icon">🎢</div><div class="name">놀이공원 알바</div><div class="desc">영혼없는 하이톤</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice5" class="voice-option" value="https://huggingface.co/datasets/Narsil/asr_dummy/resolve/main/2.flac">
                <label for="voice5" class="voice-label">
                    <div class="icon">💼</div><div class="name">수석 비서관</div><div class="desc">차갑고 냉정함</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice6" class="voice-option" value="https://huggingface.co/datasets/Narsil/asr_dummy/resolve/main/3.flac">
                <label for="voice6" class="voice-label">
                    <div class="icon">💯</div><div class="name">수능 1타 강사</div><div class="desc">속사포 팩폭</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice7" class="voice-option" value="https://huggingface.co/datasets/distil-whisper/librispeech_long/resolve/main/sample_02.wav">
                <label for="voice7" class="voice-label">
                    <div class="icon">👵</div><div class="name">전래동화 할매</div><div class="desc">옛날 옛적에~</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice8" class="voice-option" value="https://huggingface.co/datasets/distil-whisper/librispeech_long/resolve/main/sample_03.wav">
                <label for="voice8" class="voice-label">
                    <div class="icon">🪖</div><div class="name">논산 독사 조교</div><div class="desc">피도 눈물도 없음</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice9" class="voice-option" value="https://huggingface.co/datasets/sanchit-gandhi/whisper-jax-test-files/resolve/main/mary.wav">
                <label for="voice9" class="voice-label">
                    <div class="icon">👦</div><div class="name">재롱잔치 조카</div><div class="desc">킹받게 귀여움</div>
                </label>

                <input type="radio" name="voiceSelect" id="voice10" class="voice-option" value="https://huggingface.co/datasets/distil-whisper/librispeech_long/resolve/main/sample_04.wav">
                <label for="voice10" class="voice-label">
                    <div class="icon">🧛‍♂️</div><div class="name">중2병 흑염룡</div><div class="desc">크큭...파괴한다</div>
                </label>

            </div>
        </div>

        <button id="generateBtn">🚀 어그로 만점 목소리 뽑기!</button>
        
        <div id="status-area">
            <div id="loading-txt">⏳ AI 성우가 목 푸는 중입니다...</div>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusArea = document.getElementById('status-area');
        const loadingTxt = document.getElementById('loading-txt');
        const audioPlayer = document.getElementById('audioPlayer');

        generateBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (!text) return alert("대본을 먼저 적어주십쇼 형님!");

            const selectedSpeakerUrl = document.querySelector('input[name="voiceSelect"]:checked').value;

            audioPlayer.style.display = 'none';
            statusArea.style.display = 'block';
            loadingTxt.innerText = "🚀 AI가 목소리를 쥐어짜고 있습니다...";
            loadingTxt.style.color = '#e84118';
            generateBtn.disabled = true;

            try {
                const startResponse = await fetch('/api/voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, speakerUrl: selectedSpeakerUrl })
                });
                
                let prediction = await startResponse.json();

                if (!startResponse.ok || prediction.error) {
                    throw new Error("주문 거절됨: " + (prediction.error || "알 수 없는 에러"));
                }

                while (prediction.status !== "succeeded" && prediction.status !== "failed") {
                    await new Promise(r => setTimeout(r, 3000)); 
                    
                    const pollResponse = await fetch('/api/voice', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ predictionId: prediction.id }) 
                    });
                    
                    prediction = await pollResponse.json();

                    if (!pollResponse.ok) throw new Error("확인 중 오류: " + prediction.error);
                }

                if (prediction.status === "succeeded") {
                    loadingTxt.innerText = "🎉 생성 완료! 당장 들어보십쇼 ㅋㅋㅋ";
                    loadingTxt.style.color = '#44bd32';
                    audioPlayer.src = prediction.output; 
                    audioPlayer.style.display = 'block';
                } else {
                    throw new Error("AI가 녹음을 망쳤습니다. 상태: " + prediction.status);
                }

            } catch (error) {
                alert("통신 실패!\n원인: " + error.message);
                statusArea.style.display = 'none';
            } finally {
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
